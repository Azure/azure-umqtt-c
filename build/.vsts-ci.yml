name: $(BuildID)_$(BuildDefinitionName)_$(SourceBranchName)_$(Date:yyyyMMdd)$(Rev:.r)

# NOTE: This pipeline was migrated off the internal csdkcontainerregistry
# container images and the self-hosted 'sdk-c--*' agent pools (which are no
# longer available) onto Microsoft-hosted vmImage agents, mirroring the
# structural fixes applied to azure-c-shared-utility/build/.vsts-ci.yml.
#
# umqtt has no E2E tests, so the IoT Hub / DPS secret env blocks that used
# to be plumbed into every job have been removed. The 'Download secrets:
# c-production' task is also dropped -- the c-production key vault rejects
# requests from non-master branches and the secrets are not needed for
# unit tests.

resources:
  - repo: self
    clean: true

jobs:
- job: checksubmodule
  variables:
    CodeQL.Enabled: false
  pool:
    vmImage: 'ubuntu-24.04'
  displayName: 'Check Submodules'
  steps:
  - script: git config --global core.longpaths true
    displayName: 'Enable git longpaths'
  - checkout: self
    submodules: recursive
  - script: |
      sudo apt-get update && sudo apt-get install -y \
      curl \
      git \
      build-essential \
      pkg-config
      sudo curl -sL https://deb.nodesource.com/setup_16.x | bash -
      sudo apt-get install -y nodejs
    displayName: 'Setup'
  - script: |
      npm install check_submodules
      node_modules/.bin/check_submodules . master
    displayName: 'Check Submodules Match'

- job: windowsx86
  timeoutInMinutes: 90
  pool:
    vmImage: 'windows-2022'
  displayName: 'Windows x86'
  # Disabled pending PR to add x86 stub for c-logging get_thread_stack.
  # See: https://github.com/ewertons/c-logging/tree/ewertons/x86-get-thread-stack-stub
  condition: false
  steps:
  - script: git config --global core.longpaths true
    displayName: 'Enable git longpaths'
  - checkout: self
    submodules: recursive
  - script: |
      call jenkins\windows_c.cmd
    displayName: 'Build'
  - task: ComponentGovernanceComponentDetection@0
    displayName: 'Component Detection'

- job: windowsx64
  timeoutInMinutes: 90
  variables:
    CodeQL.Enabled: $[eq(variables['Build.SourceBranch'], 'refs/heads/master')]
    CodeQL.Language: cpp
  pool:
    vmImage: 'windows-2022'
  displayName: 'Windows x64'
  steps:
  - script: git config --global core.longpaths true
    displayName: 'Enable git longpaths'
  - checkout: self
    submodules: recursive
  - task: CodeQL3000Init@0
  - script: |
      call jenkins\windows_c_VsDevCmd.cmd x64 && call jenkins\windows_c.cmd --platform x64
    displayName: 'Build'
  - task: CodeQL3000Finalize@0
    condition: always()
  - task: ComponentGovernanceComponentDetection@0
    displayName: 'Component Detection'

- job: windowsdynamic
  timeoutInMinutes: 90
  pool:
    vmImage: 'windows-2022'
  displayName: 'Windows Dynamic'
  steps:
  - script: git config --global core.longpaths true
    displayName: 'Enable git longpaths'
  - checkout: self
    submodules: recursive
  - script: |
      call jenkins\windows_c_VsDevCmd.cmd && call jenkins\windows_c_build_as_dynamic.cmd
    displayName: 'Build'
  - task: ComponentGovernanceComponentDetection@0
    displayName: 'Component Detection'

- job: clang
  timeoutInMinutes: 90
  pool:
    vmImage: 'ubuntu-24.04'
  displayName: 'Linux Ubuntu Clang'
  steps:
  - script: git config --global core.longpaths true
    displayName: 'Enable git longpaths'
  - checkout: self
    submodules: recursive
  - script: |
      set -e
      sudo apt-get update
      sudo apt-get install -y \
        clang \
        cmake \
        build-essential \
        pkg-config \
        curl \
        libcurl4-openssl-dev \
        libssl-dev \
        uuid-dev
    displayName: 'Host setup'
  - script: |
      export OPENSSL_ia32cap=0x00000000
      sudo chmod -R 755 .
      sudo -E ./jenkins/ubuntu_clang.sh
    displayName: 'Build'

- job: ubuntu2404
  timeoutInMinutes: 90
  pool:
    vmImage: 'ubuntu-24.04'
  displayName: 'Linux Ubuntu 24.04'
  steps:
  - script: git config --global core.longpaths true
    displayName: 'Enable git longpaths'
  - checkout: self
    submodules: recursive
  - script: |
      set -e
      sudo apt-get update
      sudo apt-get install -y \
        cmake \
        build-essential \
        pkg-config \
        curl \
        libcurl4-openssl-dev \
        libssl-dev \
        uuid-dev \
        valgrind
    displayName: 'Host setup'
  - script: |
      export OPENSSL_ia32cap=0x00000000
      sudo chmod -R 755 .
      sudo -E ./jenkins/ubuntu_c.sh
    displayName: 'Build'

- job: linuxoptions
  timeoutInMinutes: 60
  pool:
    vmImage: 'ubuntu-24.04'
  displayName: 'Linux Ubuntu with Options'
  steps:
  - script: git config --global core.longpaths true
    displayName: 'Enable git longpaths'
  - checkout: self
    submodules: recursive
  - script: |
      set -e
      sudo apt-get update
      sudo apt-get install -y \
        cmake \
        build-essential \
        pkg-config \
        curl \
        libcurl4-openssl-dev \
        libssl-dev \
        uuid-dev
    displayName: 'Host setup'
  - script: 'sudo ./jenkins/linux_c_option_test.sh'
    displayName: 'Build'
    condition: always()

- job: wolfssl
  timeoutInMinutes: 60
  pool:
    vmImage: 'ubuntu-24.04'
  displayName: 'WolfSSL'
  steps:
  - script: git config --global core.longpaths true
    displayName: 'Enable git longpaths'
  - checkout: self
    submodules: recursive
  - script: |
      set -e
      sudo apt-get update
      sudo apt-get install -y \
        clang \
        cmake \
        build-essential \
        pkg-config \
        curl \
        libcurl4-openssl-dev \
        uuid-dev \
        libwolfssl-dev || true
    displayName: 'Host setup'
  - script: |
      LD_LIBRARY_PATH=/usr/local/lib
      LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/my_library/
      sudo jenkins/linux_wolfssl.sh
    displayName: 'Build'

- job: debian
  timeoutInMinutes: 60
  pool:
    vmImage: 'ubuntu-24.04'
  displayName: 'Linux Debian (Buster)'
  steps:
  - script: git config --global core.longpaths true
    displayName: 'Enable git longpaths'
  - checkout: self
    submodules: recursive
  - script: |
      set -e
      sudo apt-get update
      sudo apt-get install -y \
        cmake \
        build-essential \
        pkg-config \
        curl \
        libcurl4-openssl-dev \
        libssl-dev \
        uuid-dev
    displayName: 'Host setup'
  - script: |
      sudo chmod 755 jenkins/debian_c.sh
      sudo -E ./jenkins/debian_c.sh
    displayName: 'Build'

- job: OSX
  timeoutInMinutes: 60
  variables:
    CodeQL.Enabled: false
    CMAKE_POLICY_VERSION_MINIMUM: '3.5'
  pool:
    vmImage: 'macOS-14'
  displayName: 'OSX'
  steps:
  - script: git config --global core.longpaths true
    displayName: 'Enable git longpaths'
  - checkout: self
    submodules: recursive
  - script: |
      ./jenkins/osx_gcc_openssl.sh
    displayName: 'Build'
  - script: rm -rf $(Agent.BuildDirectory)/*
    displayName: 'Cleanup'
    condition: always()

- job: xcodenative
  timeoutInMinutes: 60
  variables:
    CodeQL.Enabled: false
    CMAKE_POLICY_VERSION_MINIMUM: '3.5'
  pool:
    vmImage: 'macOS-14'
  displayName: 'XCode Native'
  steps:
  - script: git config --global core.longpaths true
    displayName: 'Enable git longpaths'
  - checkout: self
    submodules: recursive
  - script: |
      curl --version
      export DYLD_LIBRARY_PATH="/usr/local/Cellar/curl/$(ls -b /usr/local/Cellar/curl 2>/dev/null | grep -e '[0-9\.]' | head -1)/lib"
      ./jenkins/osx_xcode_native.sh
    displayName: 'Build'
  - script: rm -rf $(Agent.BuildDirectory)/*
    displayName: 'Cleanup'
    condition: always()

- job: raspberrypi
  # ARM cross-compile replacement for the retired raspberrypi-c-buster
  # container. We cross-compile with the arm-linux-gnueabihf toolchain on
  # an x64 Microsoft-hosted agent. Tests are NOT executed; runtime ARM
  # validation is the responsibility of downstream consumers.
  timeoutInMinutes: 60
  pool:
    vmImage: 'ubuntu-24.04'
  displayName: 'Raspberry Pi (Cross-compile only)'
  steps:
  - script: git config --global core.longpaths true
    displayName: 'Enable git longpaths'
  - checkout: self
    submodules: recursive
  - script: |
      set -e
      sudo apt-get update
      sudo apt-get install -y \
        cmake \
        build-essential \
        pkg-config \
        crossbuild-essential-armhf
    displayName: 'Install armhf cross toolchain'
  - script: |
      set -e
      mkdir -p cmake-armhf
      cd cmake-armhf
      cmake \
        -DCMAKE_SYSTEM_NAME=Linux \
        -DCMAKE_SYSTEM_PROCESSOR=arm \
        -DCMAKE_C_COMPILER=arm-linux-gnueabihf-gcc \
        -DCMAKE_CXX_COMPILER=arm-linux-gnueabihf-g++ \
        -DCMAKE_BUILD_TYPE=Debug \
        -Drun_unittests:BOOL=OFF \
        -Dskip_samples:BOOL=ON \
        -Duse_installed_dependencies:BOOL=OFF \
        -Duse_default_uuid:BOOL=ON \
        -Duse_http:BOOL=OFF \
        -Duse_openssl:BOOL=OFF \
        ..
      make -j$(nproc)
    displayName: 'Cross-compile umqtt for armhf'
